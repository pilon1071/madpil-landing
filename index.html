<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Madpil Technology — Tu negocio, despierto las 24 horas</title>
<meta name="description" content="Webs, redes, WhatsApp y recepción virtual conectados por IA. Un solo sistema. Sin pausas. Sin fricciones." />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="preload" as="image" href="assets/madpil-frame-1.png" />

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          heading: ['"Instrument Serif"', 'serif'],
          body: ['Barlow', 'system-ui', 'sans-serif'],
        },
        colors: {
          bgprimary: '#030814',
          bgsecondary: '#0A1628',
          surface: '#0F1F3A',
          neonblue: '#2DA8FF',
          neongreen: '#4DFF9C',
        },
      },
    },
  };
</script>

<style>
  :root {
    --bg-primary: #030814;
    --bg-secondary: #0A1628;
    --surface: #0F1F3A;
    --foreground: #FFFFFF;
    --muted: rgba(255, 255, 255, 0.6);
    --neon-blue: #2DA8FF;
    --neon-green: #4DFF9C;
    --border: rgba(255, 255, 255, 0.12);
    --glass-bg: rgba(255, 255, 255, 0.04);
    --glass-border: rgba(255, 255, 255, 0.18);
    --glass-blur: 16px;
    --radius: 9999px;
  }
  html, body { background: #030814; }
  body {
    font-family: 'Barlow', system-ui, sans-serif;
    color: #FFFFFF;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
  }
  ::selection { background: rgba(45,168,255,0.35); color: #fff; }

  /* Focus rings */
  a:focus-visible, button:focus-visible {
    outline: 2px solid rgba(45,168,255,0.4);
    outline-offset: 3px;
    border-radius: 9999px;
  }

  /* Subtle starfield over body for depth */
  body::before {
    content: '';
    position: fixed; inset: 0;
    pointer-events: none; z-index: 0;
    background:
      radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.18), transparent 60%),
      radial-gradient(1px 1px at 65% 15%, rgba(45,168,255,0.18), transparent 60%),
      radial-gradient(1px 1px at 80% 70%, rgba(77,255,156,0.12), transparent 60%),
      radial-gradient(1.5px 1.5px at 35% 80%, rgba(255,255,255,0.12), transparent 60%);
  }

  /* Liquid glass */
  .liquid-glass {
    background: rgba(255, 255, 255, 0.01);
    background-blend-mode: luminosity;
    -webkit-backdrop-filter: blur(4px);
            backdrop-filter: blur(4px);
    border: none;
    box-shadow:
      inset 0 1px 1px rgba(255, 255, 255, 0.10),
      0 1px 0 rgba(0,0,0,0.2);
    position: relative;
    overflow: hidden;
  }
  .liquid-glass::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    padding: 1.4px;
    background: linear-gradient(180deg,
      rgba(255,255,255,0.45) 0%,
      rgba(255,255,255,0.15) 20%,
      rgba(255,255,255,0) 40%,
      rgba(255,255,255,0) 60%,
      rgba(255,255,255,0.15) 80%,
      rgba(255,255,255,0.45) 100%);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
            mask-composite: exclude;
    pointer-events: none;
  }

  .liquid-glass-strong {
    background: rgba(255, 255, 255, 0.06);
    background-blend-mode: luminosity;
    -webkit-backdrop-filter: blur(50px) saturate(140%);
            backdrop-filter: blur(50px) saturate(140%);
    border: none;
    box-shadow:
      inset 0 1px 1px rgba(255, 255, 255, 0.18),
      inset 0 -1px 1px rgba(255, 255, 255, 0.08),
      0 8px 24px rgba(0,0,0,0.35);
    position: relative;
    overflow: hidden;
  }
  .liquid-glass-strong::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    padding: 1.4px;
    background: linear-gradient(180deg,
      rgba(255,255,255,0.5) 0%,
      rgba(255,255,255,0.2) 20%,
      rgba(255,255,255,0) 40%,
      rgba(255,255,255,0) 60%,
      rgba(255,255,255,0.2) 80%,
      rgba(255,255,255,0.5) 100%);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
            mask-composite: exclude;
    pointer-events: none;
  }

  /* Section divider haze */
  .haze-fade-top    { background: linear-gradient(to bottom, #030814, rgba(3,8,20,0)); }
  .haze-fade-bottom { background: linear-gradient(to top,    #030814, rgba(3,8,20,0)); }

  /* Hero stage — text flows above the video in normal document order. */
  .hero-stage {
    padding-top: 96px;            /* leave room for the floating navbar */
  }
  .hero-video-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    max-height: min(900px, 80svh);
    overflow: hidden;
    background: #030814;
  }
  .hero-video-wrap video {
    image-rendering: auto;
  }
  @media (max-width: 768px) {
    .hero-stage { padding-top: 84px; }
    .hero-video-wrap {
      aspect-ratio: 4 / 3;
      max-height: 60svh;
    }
  }

  /* Reduce motion */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.001ms !important;
      transition-duration: 0.001ms !important;
    }
  }
</style>

<!-- React + Babel (pinned) -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Motion (Framer Motion successor) -->
<script src="https://unpkg.com/framer-motion@11.18.2/dist/framer-motion.js"></script>
<script>
  // Normalise the global so the JSX can read window.Motion
  window.Motion = window.Motion || window.framerMotion || window.FramerMotion;
</script>

</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react" src="app.jsx"></script>
</body>
</html>
